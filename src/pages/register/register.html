<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo Tài Khoản</title>
    <link rel="stylesheet" href="../../dist/css/output.css" />
    <link rel="stylesheet" href="./register.css" />
  </head>
  <body>
    <div class="min-h-screen bg-orange-950">
      <nav
        class="fixed top-0 left-0 right-0 z-50 bg-transparent shadow-lg text-white transition-all duration-300"
      >
        <div
          class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"
        >
          <div class="flex items-center space-x-6">
            <h1 class="text-2xl font-bold">Lịch sử đảng cộng sản việt nam</h1>
          </div>
          <div class="flex items-center space-x-6">
            <a href="index.html" class="text-white-100 hover:text-olive-400"
              >Tìm hiểu về lịch sử</a
            >
            <a href="#" class="text-olive-100 hover:text-olive-400">làm quiz</a>
            <a href="#" class="text-olive-100 hover:text-olive-400">About me</a>
            <a href="login.html" class="text-white hover:text-orange-400"
              >Đăng nhập</a
            >
            <a href="register.html" class="text-white hover:text-orange-400"
              >Tạo tài khoản</a
            >
          </div>
        </div>
      </nav>

      <!-- Registration Form Section -->
      <section class="pt-24 pb-12">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
          <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Tạo Tài Khoản
          </h2>
          <form action="#" method="post">
            <div class="mb-4">
              <label for="username" class="block text-gray-700 font-medium mb-2"
                >Username</label
              >
              <input
                type="text"
                id="username"
                name="username"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                required
              />
              <div
                id="username-error"
                class="text-red-500 text-sm mt-1"
                style="display: none"
              ></div>
            </div>
            <div class="mb-4">
              <label for="password" class="block text-gray-700 font-medium mb-2"
                >Password</label
              >
              <input
                type="password"
                id="password"
                name="password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                required
              />
              <div
                id="password-validate-error"
                class="text-red-500 text-sm mt-1"
                style="display: none"
              ></div>
            </div>
            <div class="mb-6">
              <label
                for="confirm-password"
                class="block text-gray-700 font-medium mb-2"
                >Confirm Password</label
              >
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                required
              />
              <div
                id="password-error"
                class="text-red-500 text-sm mt-1"
                style="display: none"
              ></div>
            </div>
            <button
              type="submit"
              class="w-full bg-orange-600 text-white py-2 px-4 rounded-lg hover:bg-orange-700 transition duration-300"
            >
              Tạo Tài Khoản
            </button>
          </form>
        </div>
      </section>

      <!-- Success Modal -->
      <div
        id="success-modal"
        class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50"
      >
        <div
          class="bg-white p-8 rounded-lg shadow-lg text-center max-w-sm mx-4"
        >
          <div class="text-green-500 mb-4">
            <svg
              class="w-16 h-16 mx-auto"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                clip-rule="evenodd"
              ></path>
            </svg>
          </div>
          <h3 class="text-2xl font-bold text-gray-800 mb-2">
            Đăng ký thành công!
          </h3>
          <p class="text-gray-600">
            Chào mừng bạn đến với trang web của chúng tôi.
          </p>
        </div>
      </div>
    </div>

    <script src="./register.js"></script>
  </body>
</html>
