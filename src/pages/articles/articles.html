<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài Viết Lịch Sử</title>
    <link rel="stylesheet" href="../../dist/css/output.css" />
    <link rel="stylesheet" href="./articles.css" />
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="min-h-screen bg-orange-950 relative overflow-hidden">
      <!-- Decorative background elements -->
      <div class="absolute inset-0 articles-pattern opacity-10"></div>
      <div
        class="absolute -top-32 -right-32 w-96 h-96 bg-yellow-400/20 rounded-full blur-3xl articles-float"
      ></div>
      <div
        class="absolute top-1/3 -left-32 w-80 h-80 bg-orange-500/20 rounded-full blur-3xl articles-float-delay"
      ></div>
      <div
        class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-red-500/15 rounded-full blur-3xl articles-float"
      ></div>

      <!-- Nav -->
      <nav
        class="fixed top-0 left-0 right-0 z-50 bg-transparent shadow-lg text-white transition-all duration-300"
      >
        <div
          class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"
        >
          <div class="flex items-center space-x-6">
            <a href="index.html" class="text-white no-underline">
              <h1 class="text-2xl font-bold">Lịch sử đảng cộng sản việt nam</h1>
            </a>
          </div>
          <button
            id="nav-toggle"
            class="nav:hidden text-white focus:outline-none"
            aria-label="Menu"
          >
            <svg
              class="w-7 h-7"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              ></path>
            </svg>
          </button>
          <div class="hidden nav:flex items-center space-x-6" id="nav-right">
            <a href="index.html" class="text-white/90 hover:text-yellow-400"
              >Trang chủ</a
            >
            <a href="history.html" class="text-white/90 hover:text-yellow-400"
              >Tìm hiểu về lịch sử</a
            >
            <a href="quiz.html" class="text-white/90 hover:text-yellow-400"
              >Làm quiz</a
            >
            <a
              href="login.html"
              class="text-white hover:text-orange-400"
              id="login-link"
              >Đăng nhập</a
            >
            <a
              href="register.html"
              class="text-white hover:text-orange-400"
              id="register-link"
              >Tạo tài khoản</a
            >
          </div>
        </div>
        <div
          id="mobile-menu"
          class="nav:hidden hidden bg-black/90 backdrop-blur-sm px-4 pb-4 pt-2 space-y-3"
        >
          <a
            href="index.html"
            class="block text-white/90 hover:text-yellow-400 py-2 border-b border-white/10"
            >Trang chủ</a
          >
          <a
            href="history.html"
            class="block text-white/90 hover:text-yellow-400 py-2 border-b border-white/10"
            >Tìm hiểu về lịch sử</a
          >
          <a
            href="quiz.html"
            class="block text-white/90 hover:text-yellow-400 py-2 border-b border-white/10"
            >Làm quiz</a
          >
          <a
            href="login.html"
            class="block text-white/90 hover:text-yellow-400 py-2 border-b border-white/10"
            id="mobile-login-link"
            >Đăng nhập</a
          >
          <a
            href="register.html"
            class="block text-white/90 hover:text-yellow-400 py-2"
            id="mobile-register-link"
            >Tạo tài khoản</a
          >
        </div>
      </nav>

      <!-- Main Content -->
      <main class="pt-24 pb-16 px-4 relative z-10">
        <div class="max-w-5xl mx-auto">
          <!-- Header -->
          <div class="flex items-center justify-between mb-10">
            <h2 class="text-3xl md:text-4xl font-bold text-white">
              📰 Bài Viết Lịch Sử
            </h2>
            <!-- Admin: New Article button -->
            <button
              id="btn-new-article"
              class="hidden bg-gradient-to-r from-red-600 to-red-700 text-white font-semibold px-5 py-2.5 rounded-xl transition-all duration-300 shadow-lg shadow-red-500/25 hover:from-red-700 hover:to-red-800 hover:shadow-red-500/40 active:scale-[0.98]"
            >
              + Tạo bài viết
            </button>
          </div>

          <!-- Articles List View -->
          <div id="articles-list" class="space-y-6"></div>
          <div
            id="articles-empty"
            class="hidden text-center text-white/50 py-20 text-lg"
          >
            Chưa có bài viết nào.
          </div>

          <!-- Single Article View -->
          <div id="article-detail" class="hidden">
            <button
              id="btn-back"
              class="text-yellow-400 hover:text-yellow-300 mb-6 inline-flex items-center gap-2"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 19l-7-7 7-7"
                ></path>
              </svg>
              Quay lại danh sách
            </button>
            <article
              class="bg-white/5 border border-white/10 rounded-xl p-6 md:p-10"
            >
              <img
                id="detail-image"
                class="w-full h-64 md:h-96 object-cover rounded-lg mb-6"
                alt=""
              />
              <h1
                id="detail-title"
                class="text-2xl md:text-4xl font-bold text-white mb-4"
              ></h1>
              <div class="text-white/40 text-sm mb-6" id="detail-date"></div>
              <div
                id="detail-content"
                class="prose prose-invert prose-lg max-w-none text-white/90"
              ></div>
            </article>
          </div>

          <!-- Admin: Manage Panel (controls are now on cards) -->
          <div id="admin-manage" class="hidden"></div>
        </div>
      </main>
    </div>

    <!-- Admin: Editor Panel (outside main for proper z-index stacking) -->
    <div
      id="editor-panel"
      class="hidden fixed inset-0 z-[100] bg-orange-950 overflow-y-auto"
    >
      <div class="max-w-4xl mx-auto py-8 px-4">
        <div class="flex items-center justify-between mb-6">
          <h2 id="editor-heading" class="text-2xl font-bold text-white">
            Tạo bài viết mới
          </h2>
          <button
            id="btn-close-editor"
            class="text-white/60 hover:text-white text-3xl"
          >
            &times;
          </button>
        </div>
        <div class="space-y-5">
          <div>
            <label class="block text-white/70 text-sm mb-1">Tiêu đề</label>
            <input
              id="editor-title"
              type="text"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-yellow-400"
              placeholder="Nhập tiêu đề bài viết..."
            />
          </div>
          <div>
            <label class="block text-white/70 text-sm mb-1">Tóm tắt</label>
            <input
              id="editor-summary"
              type="text"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-yellow-400"
              placeholder="Mô tả ngắn gọn nội dung..."
            />
          </div>
          <div>
            <label class="block text-white/70 text-sm mb-1">URL hình ảnh</label>
            <input
              id="editor-image"
              type="text"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-yellow-400"
              placeholder="../images/example.jpg"
            />
          </div>
          <div>
            <label class="block text-white/70 text-sm mb-1"
              >Nội dung (Markdown)</label
            >
            <div class="flex gap-2 mb-2">
              <button
                class="editor-tab active text-sm px-3 py-1 rounded bg-white/20 text-white"
                data-tab="write"
              >
                Viết
              </button>
              <button
                class="editor-tab text-sm px-3 py-1 rounded bg-white/5 text-white/50"
                data-tab="preview"
              >
                Xem trước
              </button>
            </div>
            <textarea
              id="editor-content"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-yellow-400 font-mono text-sm"
              rows="16"
              placeholder="Viết nội dung bằng Markdown..."
            ></textarea>
            <div
              id="editor-preview"
              class="hidden w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 prose prose-invert max-w-none min-h-[24rem] overflow-y-auto"
            ></div>
          </div>
          <div class="flex gap-3 pt-2">
            <button
              id="btn-save-article"
              class="bg-gradient-to-r from-red-600 to-red-700 text-white font-semibold px-6 py-2.5 rounded-xl transition-all duration-300 shadow-lg shadow-red-500/25 hover:from-red-700 hover:to-red-800 hover:shadow-red-500/40 active:scale-[0.98]"
            >
              Lưu bài viết
            </button>
            <button
              id="btn-cancel-editor"
              class="bg-white/10 hover:bg-white/20 text-white px-6 py-2.5 rounded-xl transition-colors"
            >
              Huỷ
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="./articles.js"></script>
  </body>
</html>
