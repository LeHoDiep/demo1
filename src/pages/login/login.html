<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="../../dist/css/output.css" />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <div class="min-h-screen bg-orange-950">
      <nav
        class="fixed top-0 left-0 right-0 z-50 bg-transparent shadow-lg text-white transition-all duration-300"
      >
        <div
          class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"
        >
          <div class="flex items-center space-x-6">
            <h1 class="text-2xl font-bold">Lịch sử đảng cộng sản việt nam</h1>
          </div>
          <div class="flex items-center space-x-6">
            <a href="index.html" class="text-white-100 hover:text-olive-400"
              >Tìm hiểu về lịch sử</a
            >
            <a href="#" class="text-olive-100 hover:text-olive-400">làm quiz</a>
            <a href="#" class="text-olive-100 hover:text-olive-400">About me</a>
            <a href="login.html" class="text-white hover:text-orange-400"
              >Đăng nhập</a
            >
            <a href="register.html" class="text-white hover:text-orange-400"
              >Tạo tài khoản</a
            >
          </div>
        </div>
      </nav>

      <!-- Login Form Section -->
      <section class="pt-24 pb-12">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
          <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Đăng Nhập
          </h2>
          <form id="login-form" action="#" method="post">
            <div class="mb-4">
              <label for="username" class="block text-gray-700 font-medium mb-2"
                >Username</label
              >
              <input
                type="text"
                id="username"
                name="username"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                required
              />
              <div
                id="username-error"
                class="text-red-500 text-sm mt-1"
                style="display: none"
              ></div>
            </div>
            <div class="mb-6">
              <label for="password" class="block text-gray-700 font-medium mb-2"
                >Password</label
              >
              <input
                type="password"
                id="password"
                name="password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                required
              />
              <div
                id="password-error"
                class="text-red-500 text-sm mt-1"
                style="display: none"
              ></div>
            </div>
            <button
              type="submit"
              class="w-full bg-orange-600 text-white px-4 py-2 rounded-lg hover:bg-orange-700 transition duration-300 font-medium"
            >
              Đăng Nhập
            </button>
          </form>
          <p class="text-center text-gray-600 mt-4">
            Chưa có tài khoản?
            <a
              href="register.html"
              class="text-orange-600 hover:text-orange-700 font-medium"
              >Tạo tài khoản</a
            >
          </p>
        </div>
      </section>

      <!-- Success Modal -->
      <div
        id="success-modal"
        class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50"
      >
        <div class="bg-white rounded-lg shadow-lg p-8 max-w-sm w-full mx-4">
          <h2 class="text-2xl font-bold text-center text-green-600 mb-4">
            Đăng nhập thành công!
          </h2>
          <p class="text-center text-gray-600">Chuyển hướng về trang chủ...</p>
        </div>
      </div>
    </div>

    <script src="./login.js"></script>
  </body>
</html>
