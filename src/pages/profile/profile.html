<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông Tin Người Dùng</title>
    <link rel="stylesheet" href="../../dist/css/output.css" />
    <link rel="stylesheet" href="./profile.css" />
  </head>
  <body>
    <div class="min-h-screen bg-orange-950">
      <nav
        class="fixed top-0 left-0 right-0 z-50 bg-transparent shadow-lg text-white transition-all duration-300"
      >
        <div
          class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"
        >
          <div class="flex items-center space-x-6">
            <h1 class="text-2xl font-bold">Lịch sử đảng cộng sản việt nam</h1>
          </div>
          <div class="flex items-center space-x-6" id="nav-right">
            <a href="index.html" class="text-white-100 hover:text-olive-400"
              >Tìm hiểu về lịch sử</a
            >
            <a href="#" class="text-olive-100 hover:text-olive-400">làm quiz</a>
            <a href="#" class="text-olive-100 hover:text-olive-400">About me</a>
            <div class="relative">
              <button
                id="user-menu-button"
                class="text-white hover:text-orange-400"
              >
                Welcome, <span id="username-display"></span> ▼
              </button>
              <div
                id="user-menu"
                class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg hidden z-50"
              >
                <a
                  href="profile.html"
                  class="block px-4 py-2 text-gray-700 hover:bg-gray-100"
                  >Xem thông tin</a
                >
                <a
                  href="#"
                  id="logout-btn"
                  class="block px-4 py-2 text-gray-700 hover:bg-gray-100"
                  >Logout</a
                >
              </div>
            </div>
          </div>
        </div>
      </nav>

      <!-- Profile Section -->
      <section class="pt-24 pb-12">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
          <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Thông Tin Người Dùng
          </h2>
          <div class="space-y-4">
            <div>
              <label class="block text-gray-700 font-medium">Username:</label>
              <p
                id="profile-username"
                class="text-gray-900 bg-gray-100 p-2 rounded"
              ></p>
            </div>
            <!-- Add more fields if needed -->
          </div>
          <div class="mt-6 text-center">
            <a
              href="index.html"
              class="bg-orange-600 text-white px-4 py-2 rounded-lg hover:bg-orange-700 transition duration-300"
              >Quay lại</a
            >
          </div>
        </div>
      </section>
    </div>

    <script src="./profile.js"></script>
  </body>
</html>
