  <body>
    <div class="min-h-screen bg-orange-950">
      <nav
        class="fixed top-0 left-0 right-0 z-50 bg-transparent shadow-lg text-white transition-all duration-300"
      >
        <div
          class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"
        >
          <div class="flex items-center space-x-6">
            <h1 class="text-2xl font-bold">Lịch sử đảng cộng sản việt nam</h1>
          </div>
          <div class="flex items-center space-x-6">
            <a href="index.html" class="text-white-100 hover:text-olive-400"
              >Tìm hiểu về lịch sử</a
            >
            <a href="#" class="text-olive-100 hover:text-olive-400">làm quiz</a>
            <a href="#" class="text-olive-100 hover:text-olive-400">About me</a>
            <a href="login.html" class="text-white hover:text-orange-400"
              >Đăng nhập</a
            >
            <a href="register.html" class="text-white hover:text-orange-400"
              >Tạo tài khoản</a
            >
          </div>
        </div>
      </nav>

      <!-- Login Form Section -->
      <section class="pt-24 pb-12">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
          <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Đăng Nhập
          </h2>
          <form id="login-form" action="#" method="post">
            <div class="mb-4">
              <label for="username" class="block text-gray-700 font-medium mb-2"
                >Username</label
              >
              <input
                type="text"
                id="username"
                name="username"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                required
              />
              <div
                id="username-error"
                class="text-red-500 text-sm mt-1"
                style="display: none"
              ></div>
            </div>
            <div class="mb-6">
              <label for="password" class="block text-gray-700 font-medium mb-2"
                >Password</label
              >
              <input
                type="password"
                id="password"
                name="password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                required
              />
              <div
                id="password-error"
                class="text-red-500 text-sm mt-1"
                style="display: none"
              ></div>
            </div>
            <button
              type="submit"
              class="w-full bg-orange-600 text-white px-4 py-2 rounded-lg hover:bg-orange-700 transition duration-300 font-medium"
            >
              Đăng Nhập
            </button>
          </form>
          <p class="text-center text-gray-600 mt-4">
            Chưa có tài khoản?
            <a
              href="register.html"
              class="text-orange-600 hover:text-orange-700 font-medium"
              >Tạo tài khoản</a
            >
          </p>
        </div>
      </section>

      <!-- Success Modal -->
      <div
        id="success-modal"
        class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50"
      >
        <div class="bg-white rounded-lg shadow-lg p-8 max-w-sm w-full mx-4">
          <h2 class="text-2xl font-bold text-center text-green-600 mb-4">
            Đăng nhập thành công!
          </h2>
          <p class="text-center text-gray-600">Chuyển hướng về trang chủ...</p>
        </div>
      </div>
    </div>

    <script>
// Password hashing function using SHA-256
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray
    .map((b) => b.toString(16).padStart(2, "0"))
    .join("");
  return hashHex;
}

// Get login form
const loginForm = document.getElementById("login-form");

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  // Clear previous errors
  document.getElementById("username-error").style.display = "none";
  document.getElementById("password-error").style.display = "none";

  // Hash the password
  const hashedPassword = await hashPassword(password);

  try {
    // Fetch users from API
    const response = await fetch(
      "https://69abf1aa9ca639a5217dcdec.mockapi.io/users",
    );
    const users = await response.json();

    // Find user with matching username and password
    const user = users.find(
      (u) => u.username === username && u.password === hashedPassword,
    );

    if (user) {
      // Login successful
      const modal = document.getElementById("success-modal");
      modal.classList.remove("hidden");
      localStorage.setItem("user", JSON.stringify({ username: user.username }));
      setTimeout(() => {
        modal.classList.add("hidden");
        window.location.href = "index.html";
      }, 2000);
    } else {
      // Login failed - could be wrong username or password
      const userExists = users.find((u) => u.username === username);
      if (!userExists) {
        document.getElementById("username-error").textContent =
          "Username không tồn tại";
        document.getElementById("username-error").style.display = "block";
      } else {
        document.getElementById("password-error").textContent =
          "Password không đúng";
        document.getElementById("password-error").style.display = "block";
      }
    }
  } catch (error) {
    console.error("Login error:", error);
    alert("Lỗi khi đăng nhập. Vui lòng thử lại!");
  }
});

// Navigation scroll effect
window.addEventListener("scroll", function () {
  const nav = document.querySelector("nav");
  if (window.scrollY > 100) {
    nav.classList.add("bg-black/80", "backdrop-blur-sm");
    nav.classList.remove("bg-transparent");
  } else {
    nav.classList.remove("bg-black/80", "backdrop-blur-sm");
    nav.classList.add("bg-transparent");
  }
});

</script>
